<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <style>
        body {
            background-image: linear-gradient(to right, rgb(186, 228, 245), rgb(193, 230, 244), rgb(37, 191, 230));
        }
    </style>

</head>

<body>
    <h1 class="text-center display-4">Weather Application</h1>
    <div class="container d-flex p-5 w-75">
        <div>
            <img src="./assets/cloudy.png" style="height: 200px;width: 200px;margin-top: -80px;" id="imgId">
        </div>
        <div class="ms-5">
            <input type="text" id="cityInput">
            <button class="btn btn-primary ms-2" id="getWeatherBTN">Get Weather</button>
        </div>
    </div>

    <div class="container w-25" style="margin-top: -70px;">
        <div id="showWeather"></div>
    </div>

    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>
</body>

</html>
